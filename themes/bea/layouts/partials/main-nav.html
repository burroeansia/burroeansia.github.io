<div id="main-nav" class="clear-fix">
    <div class="boxed-wrapper">
        <div class="main-nav-icons">
            <div class="main-nav-search">
                <form role="search" method="get" action="{{ "search/" | relURL }}" class="clear-fix">
                    <i class="fas fa-search"></i>
                    <input type="search" name="q" placeholder="Search..." value="">
                </form>
            </div>
        </div>

        <nav class="main-menu-container">
            <ul id="main-menu">
                {{ $currentPage := . }}
                {{ range .Site.Menus.main }}
                    <li class="menu-item{{ if $currentPage.IsMenuCurrent "main" . }} current-menu-item{{ end }}">
                        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
                    </li>
                {{ end }}
            </ul>
        </nav>

        <span class="mobile-menu-btn" onclick="document.getElementById('mobile-menu').classList.toggle('open')">
            <i class="fas fa-chevron-down"></i>
        </span>
    </div>

    <nav class="mobile-menu-container">
        <ul id="mobile-menu">
            {{ range .Site.Menus.main }}
                <li class="menu-item"><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
            {{ end }}
        </ul>
    </nav>
</div>
